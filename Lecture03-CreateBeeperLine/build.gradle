plugins {
	id 'eclipse'
	id 'idea'
	id 'application'
}

application {
	mainClass = 'CreateBeeperLine'
}

dependencies {
	implementation files('libs/karel.jar', 'libs/acm-2.0.jar')
}

distributions {
    main {
        contents {
            from('worlds/CreateBeeperLine.w') {
                into('worlds')
            }
        }
    }
}

tasks.register('debug', JavaExec) {
	dependsOn classes
	mainClass = 'CreateBeeperLine'
	debug = true
}
